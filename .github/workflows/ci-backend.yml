name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # No credentials needed: config.py skips strict validation when CI=true,
    # which GitHub Actions sets automatically on all runners.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt flake8 pytest

      - name: Lint (flake8)
        run: flake8 .

      - name: Run tests
        run: python -m pytest tests/ -v
