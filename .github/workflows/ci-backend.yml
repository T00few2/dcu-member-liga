name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      # Dummy values so config.py startup validation passes in CI
      ZWIFT_USERNAME: ci_user
      ZWIFT_PASSWORD: ci_pass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=segment_results_pb2.py,scripts/

      - name: Run tests
        run: python -m pytest tests/ -v
